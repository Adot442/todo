micronaut:
  application:
    name: todo-server
  server:
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - http://localhost:3000
            - http://localhost:4200
            - http://localhost:5173
            - http://localhost:8081
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Authorization
            - Accept
          exposed-headers:
            - Content-Type
          allow-credentials: true
          max-age: 3600
