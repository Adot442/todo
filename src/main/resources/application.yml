micronaut:
  application:
    name: todo-server
  server:
    cors:
      enabled: true
      configurations:
        web:
          allowed-origin-regex: "^(https://todo-client-mu75\\.vercel\\.app|http://localhost(:\\d+)?)$"
          allowed-methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          allow-credentials: true
          max-age: 3600