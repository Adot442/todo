# ─── SonarQube / SonarCloud project properties ────────────────────────────────
# Used by the sonar-scanner CLI for local console analysis.
# Run: sonar-scanner (after building and generating coverage)
#
# Override sonar.host.url to point at a self-hosted SonarQube instance.
# The SONAR_TOKEN env-var must be exported before running the scanner.
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=adot442_todo-server
sonar.projectName=Todo Server
sonar.projectVersion=0.1

sonar.host.url=https://sonarcloud.io
sonar.organization=adot442

sonar.sources=src/main/kotlin
sonar.tests=src/test/kotlin

sonar.java.binaries=build/classes/kotlin/main
sonar.java.test.binaries=build/classes/kotlin/test

sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
sonar.junit.reportPaths=build/test-results/test

sonar.exclusions=**/Application.kt
sonar.test.inclusions=**/*Test.kt

