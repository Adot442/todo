name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write

jobs:
  build-test-analyze:
    name: Build · Test · Sonar
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history required for SonarCloud blame information
          fetch-depth: 0

      # ── 2. JDK ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Gradle permission ─────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Compile ───────────────────────────────────────────────────────────
      - name: Compile
        run: ./gradlew classes testClasses --no-daemon

      # ── 6. Test + coverage ───────────────────────────────────────────────────
      - name: Run tests & generate JaCoCo coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      # ── 7. Enforce coverage gate ─────────────────────────────────────────────
      - name: Verify coverage threshold (≥ 70 %)
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      # ── 8. Publish JUnit test results ────────────────────────────────────────
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

      # ── 9. Upload HTML test report as artifact ───────────────────────────────
      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-html
          path: build/reports/tests/test/
          retention-days: 30

      # ── 10. Upload JaCoCo HTML report as artifact ────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-html
          path: build/reports/jacoco/test/html/
          retention-days: 30

      # ── 11. Upload JaCoCo XML (for downstream tooling) ───────────────────────
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-xml
          path: build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 30

      # ── 12. SonarCloud analysis ───────────────────────────────────────────────
      # Required repository secrets:
      #   SONAR_TOKEN  – generated on https://sonarcloud.io → My Account → Security
      #
      # Required repository variables (Settings → Secrets and variables → Actions):
      #   SONAR_PROJECT_KEY  – e.g. adot442_todo-server
      #   SONAR_ORGANIZATION – your SonarCloud org key (e.g. adot442)
      - name: SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'adot442_todo-server' }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || 'adot442' }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: ./gradlew sonar --no-daemon

  # ─── Optional: build the fat-jar and attach it ─────────────────────────────
  package:
    name: Package
    runs-on: ubuntu-latest
    needs: build-test-analyze

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build shadow jar
        run: ./gradlew shadowJar --no-daemon -x test

      - name: Upload shadow jar
        uses: actions/upload-artifact@v4
        with:
          name: todo-server-fat-jar
          path: build/libs/*-all.jar
          retention-days: 30

